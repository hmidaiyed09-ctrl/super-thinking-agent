<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Sign in to your account securely">
    <meta name="theme-color" content="#1f2937">
    
    <title>Sign In</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🔐</text></svg>">
    
    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #dbeafe;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;
            
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1);
            
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            
            --transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary-light: #1e3a8a;
                --gray-50: #0f172a;
                --gray-100: #1e293b;
                --gray-200: #334155;
                --gray-300: #475569;
                --gray-400: #64748b;
                --gray-500: #78909c;
                --gray-600: #94a3b8;
                --gray-700: #cbd5e1;
                --gray-800: #e2e8f0;
                --gray-900: #f1f5f9;
            }
        }

        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--gray-900);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-md);
        }

        /* ===== ACCESSIBILITY ===== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border-width: 0;
        }

        :focus-visible {
            outline: 3px solid var(--primary);
            outline-offset: 2px;
        }

        :focus:not(:focus-visible) {
            outline: none;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ===== LAYOUT ===== */
        .login-container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: #ffffff;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: var(--spacing-lg);
            text-align: center;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-logo {
            font-size: 40px;
            margin-bottom: var(--spacing-md);
            display: block;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: var(--spacing-xs);
            letter-spacing: -0.5px;
        }

        .login-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .login-content {
            padding: var(--spacing-xl);
        }

        /* ===== FORM STRUCTURE ===== */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .form-group.inline {
            flex-direction: row;
            align-items: center;
            gap: var(--spacing-md);
        }

        /* ===== LABELS ===== */
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .form-label .required {
            color: var(--error);
            font-weight: 700;
        }

        .label-action {
            margin-left: auto;
            font-weight: 500;
            font-size: 12px;
        }

        .label-action a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }

        .label-action a:hover {
            text-decoration: underline;
        }

        /* ===== INPUT WRAPPER ===== */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: var(--spacing-md);
            color: var(--gray-400);
            font-size: 18px;
            pointer-events: none;
            transition: var(--transition);
        }

        .input-wrapper.focused .input-icon {
            color: var(--primary);
        }

        /* ===== INPUT FIELDS ===== */
        .form-input {
            width: 100%;
            padding: 11px var(--spacing-md) 11px 40px;
            
            font-size: 16px;
            font-family: inherit;
            line-height: 1.5;
            
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-md);
            background: #ffffff;
            color: var(--gray-900);
            
            transition: var(--transition);
        }

        .form-input::placeholder {
            color: var(--gray-400);
        }

        .form-input:hover {
            border-color: var(--gray-300);
        }

        .form-input:focus {
            border-color: var(--primary);
            background: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-input:disabled {
            background: var(--gray-100);
            color: var(--gray-400);
            cursor: not-allowed;
        }

        .form-input[aria-invalid="true"] {
            border-color: var(--error);
            background: rgba(239, 68, 68, 0.05);
        }

        .form-input[aria-invalid="true"]:focus {
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .form-input:-webkit-autofill,
        .form-input:-webkit-autofill:hover,
        .form-input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px #ffffff inset !important;
            -webkit-text-fill-color: var(--gray-900) !important;
        }

        /* ===== PASSWORD TOGGLE ===== */
        .password-toggle {
            position: absolute;
            right: var(--spacing-md);
            background: none;
            border: none;
            cursor: pointer;
            padding: var(--spacing-sm);
            color: var(--gray-400);
            font-size: 18px;
            transition: var(--transition);
            border-radius: var(--radius-sm);
        }

        .password-toggle:hover {
            color: var(--gray-600);
            background: var(--gray-100);
        }

        .password-toggle:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 0;
        }

        /* ===== VALIDATION FEEDBACK ===== */
        .form-error {
            font-size: 12px;
            color: var(--error);
            display: none;
            animation: slideDown 0.2s ease-out;
            min-height: 16px;
        }

        .form-error.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-hint {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: var(--spacing-xs);
        }

        /* ===== STRENGTH INDICATOR ===== */
        .password-strength {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 12px;
            color: var(--gray-500);
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            background: var(--gray-300);
            transition: all 0.3s ease;
        }

        .strength-fill.weak {
            width: 33%;
            background: var(--error);
        }

        .strength-fill.fair {
            width: 66%;
            background: var(--warning);
        }

        .strength-fill.strong {
            width: 100%;
            background: var(--success);
        }

        /* ===== CHECKBOX ===== */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .form-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
            flex-shrink: 0;
        }

        .checkbox-label {
            font-size: 13px;
            color: var(--gray-700);
            cursor: pointer;
            flex: 1;
        }

        .info-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1.5px solid var(--gray-300);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--gray-400);
            background: none;
            cursor: help;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .info-icon:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 12px var(--spacing-lg);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-secondary {
            width: 100%;
            background: var(--gray-100);
            color: var(--gray-900);
            border: 1.5px solid var(--gray-200);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--gray-200);
            border-color: var(--gray-300);
        }

        .btn-text {
            display: inline-block;
        }

        .btn-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn:disabled .btn-spinner {
            display: block;
        }

        .btn:disabled .btn-text {
            opacity: 0;
            position: absolute;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== DIVIDER ===== */
        .form-divider {
            position: relative;
            margin: var(--spacing-lg) 0;
            text-align: center;
            color: var(--gray-400);
            font-size: 12px;
        }

        .form-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--gray-200);
            z-index: 0;
        }

        .form-divider span {
            position: relative;
            background: white;
            padding: 0 var(--spacing-md);
            z-index: 1;
        }

        /* ===== SOCIAL AUTH ===== */
        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-sm);
        }

        .btn-social {
            width: auto;
            background: var(--gray-100);
            color: var(--gray-900);
            border: 1.5px solid var(--gray-200);
            font-size: 13px;
            padding: 10px var(--spacing-md);
        }

        .btn-social:hover:not(:disabled) {
            background: var(--gray-200);
            border-color: var(--gray-300);
        }

        .btn-social svg {
            width: 18px;
            height: 18px;
        }

        /* ===== ALERTS ===== */
        .alert {
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            font-size: 13px;
            border-left: 4px solid;
            animation: slideDown 0.3s ease-out;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--error);
            color: var(--error);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        .alert-hidden {
            display: none;
        }

        /* ===== FOOTER ===== */
        .login-footer {
            padding: var(--spacing-lg);
            border-top: 1px solid var(--gray-200);
            text-align: center;
            font-size: 12px;
            color: var(--gray-500);
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
            margin-top: var(--spacing-md);
        }

        .trust-badges {
            display: flex;
            justify-content: center;
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--gray-200);
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--gray-500);
        }

        /* ===== DARK MODE ===== */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1e3a8a 0%, #4c1d95 100%);
            }

            .login-card {
                background: var(--gray-100);
                color: var(--gray-50);
            }

            .login-header h1,
            .form-label,
            .checkbox-label {
                color: var(--gray-50);
            }

            .form-input {
                background: var(--gray-200);
                color: var(--gray-50);
                border-color: var(--gray-300);
            }

            .form-input::placeholder {
                color: var(--gray-500);
            }

            .form-input:focus {
                background: var(--primary-light);
            }

            .form-input:disabled {
                background: var(--gray-300);
            }

            .btn-secondary {
                background: var(--gray-200);
                color: var(--gray-50);
                border-color: var(--gray-300);
            }

            .btn-secondary:hover:not(:disabled) {
                background: var(--gray-300);
            }

            .btn-social {
                background: var(--gray-200);
                color: var(--gray-50);
                border-color: var(--gray-300);
            }

            .form-divider span {
                background: var(--gray-100);
            }

            .login-footer {
                border-top-color: var(--gray-200);
            }

            .trust-badges {
                border-bottom-color: var(--gray-200);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            body {
                padding: 0;
                min-height: 100dvh;
            }

            .login-container {
                max-width: 100%;
            }

            .login-card {
                border-radius: 0;
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
            }

            .login-header {
                min-height: 120px;
                padding: var(--spacing-md);
            }

            .login-header h1 {
                font-size: 24px;
            }

            .login-content {
                flex: 1;
                padding: var(--spacing-lg) var(--spacing-md);
            }

            .login-footer {
                padding: var(--spacing-md);
            }

            .trust-badges {
                flex-direction: column;
                gap: var(--spacing-md);
                align-items: center;
            }

            .badge {
                flex-direction: column;
                text-align: center;
            }

            .social-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <header class="login-header">
                <span class="login-logo" aria-hidden="true">🔐</span>
                <h1>Welcome Back</h1>
                <p>Sign in to your account</p>
            </header>

            <!-- Content -->
            <main class="login-content">
                <!-- Alert -->
                <div id="alert" class="alert alert-hidden" role="alert" aria-live="assertive" aria-atomic="true"></div>

                <!-- Form -->
                <form id="login-form" class="login-form" method="POST" novalidate>
                    <!-- Email -->
                    <div class="form-group">
                        <label for="email" class="form-label">
                            Email Address
                            <span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <span class="input-icon" aria-hidden="true">✉️</span>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="form-input"
                                placeholder="you@example.com"
                                required
                                autocomplete="email"
                                autocorrect="off"
                                autocapitalize="off"
                                spellcheck="false"
                                aria-invalid="false"
                                aria-required="true"
                                aria-describedby="email-error email-hint"
                            >
                        </div>
                        <div id="email-error" class="form-error" role="alert"></div>
                        <div id="email-hint" class="form-hint" role="status"></div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <div class="form-label">
                            <label for="password">
                                Password
                                <span class="required">*</span>
                            </label>
                            <span class="label-action">
                                <a href="/forgot-password">Forgot?</a>
                            </span>
                        </div>
                        <div class="input-wrapper">
                            <span class="input-icon" aria-hidden="true">🔒</span>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-input"
                                placeholder="••••••••"
                                required
                                autocomplete="current-password"
                                aria-invalid="false"
                                aria-required="true"
                                aria-describedby="password-error password-strength"
                            >
                            <button
                                type="button"
                                class="password-toggle"
                                id="toggle-password"
                                aria-label="Show password"
                                aria-pressed="false"
                            >
                                👁️
                            </button>
                        </div>
                        <div id="password-error" class="form-error" role="alert"></div>
                        <div id="password-strength" class="password-strength" role="status" aria-live="polite"></div>
                    </div>

                    <!-- Remember Me -->
                    <div class="form-group inline">
                        <div class="checkbox-group">
                            <input
                                type="checkbox"
                                id="remember"
                                name="remember"
                                class="form-checkbox"
                            >
                            <label for="remember" class="checkbox-label">
                                Keep me signed in
                            </label>
                            <button
                                type="button"
                                class="info-icon"
                                id="remember-info"
                                aria-label="What does this mean?"
                            >
                                ?
                            </button>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary" id="submit-btn">
                        <span class="btn-text">Sign In</span>
                        <div class="btn-spinner"></div>
                    </button>
                </form>

                <!-- Divider -->
                <div class="form-divider">
                    <span>or continue with</span>
                </div>

                <!-- Social Auth -->
                <div class="social-buttons">
                    <button type="button" class="btn btn-social" id="google-btn" aria-label="Sign in with Google">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google
                    </button>
                    <button type="button" class="btn btn-social" id="github-btn" aria-label="Sign in with GitHub">
                        <svg viewBox="0 0 24 24" fill="currentColor">
