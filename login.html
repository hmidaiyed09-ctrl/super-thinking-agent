<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .form-input.error {
            border-color: #e74c3c;
        }

        .form-input.success {
            border-color: #2ecc71;
        }

        .form-input.show-password {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .password-toggle {
            position: relative;
        }

        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .toggle-btn:hover {
            color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            color: #667eea;
            margin-top: 15px;
        }

        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }

        .success-message {
            color: #2ecc71;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }

        .input-group {
            position: relative;
        }

        .input-group .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .form-input {
            padding-left: 45px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            color: #666;
            font-size: 14px;
            cursor: pointer;
        }

        .social-login {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .social-btn img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }

        .social-btn span {
            color: #333;
            font-weight: 500;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e1e5e9;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-link {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 10px;
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 24px;
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 16px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: #e74c3c;
        }

        .toast.success {
            background: #2ecc71;
        }

        .toast.info {
            background: #667eea;
        }

        .toast .close-toast {
            float: right;
            cursor: pointer;
            margin-left: 10px;
        }

        .toast .close-toast:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Secure Login</h1>
            <p>Enter your credentials to access your account</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-icon">📧</span>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                    >
                </div>
                <div id="emailError" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="password-toggle">
                    <div class="input-group">
                        <span class="input-icon">🔐</span>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input" 
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="toggle-btn" onclick="togglePassword()">📋</button>
                    </div>
                    <div id="passwordError" class="error-message"></div>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember me</label>
            </div>

            <div class="forgot-link">
                <a href="#" onclick="showToast('info', 'Password reset link will be sent to your email.')">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary">
                <span id="loginText">Login</span>
                <div class="spinner" id="loadingSpinner"></div>
            </button>

            <div class="loading" id="loadingMessage">
                <span>Authenticating...</span>
            </div>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn" onclick="socialLogin('google')">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v6/icons/google.svg" alt="Google">
                    <span>Continue with Google</span>
                </button>
            </div>
        </form>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-btn');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordInput.classList.add('show-password');
                toggleBtn.textContent = '🔎';
            } else {
                passwordInput.type = 'password';
                passwordInput.classList.remove('show-password');
                toggleBtn.textContent = '📋';
            }
        }

        function showToast(type, message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const loginBtn = document.querySelector('.btn-primary');
            const loginText = document.getElementById('loginText');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const loadingMessage = document.getElementById('loadingMessage');
            
            emailError.textContent = '';
            passwordError.textContent = '';
            
            let hasError = false;
            
            if (!email || !email.includes('@')) {
                emailError.textContent = 'Please enter a valid email address';
                hasError = true;
            }
            
            if (!password || password.length < 8) {
                passwordError.textContent = 'Password must be at least 8 characters';
                hasError = true;
            }
            
            if (hasError) return;
            
            loginBtn.disabled = true;
            loginText.style.display = 'none';
            loadingSpinner.style.display = 'inline-block';
            loadingMessage.style.display = 'block';
            
            try {
                await simulateLogin(email, password, remember);
                showToast('success', 'Login successful! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } catch (error) {
                showToast('error', 'Invalid credentials. Please try again.');
                emailError.textContent = 'Invalid email or password';
                passwordError.textContent = 'Invalid email or password';
            } finally {
                loginBtn.disabled = false;
                loginText.style.display = 'inline';
                loadingSpinner.style.display = 'none';
                loadingMessage.style.display = 'none';
            }
        });

        function simulateLogin(email, password, remember) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (email === 'test@example.com' && password === 'password123') {
                        resolve();
                    } else {
                        reject();
                    }
                }, 1500);
            });
        }

        function socialLogin(provider) {
            showToast('info', `${provider.charAt(0).toUpperCase() + provider.slice(1)} login will open in a new window.`);
            setTimeout(() => {
                window.open(`https://accounts.google.com/signin/v2/identifier?${provider}`, '_blank');
            }, 1000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            
            emailInput.addEventListener('input', () => {
                if (emailInput.value.includes('@')) {
                    emailInput.classList.remove('error');
                    emailInput.classList.add('success');
                } else {
                    emailInput.classList.remove('success');
                    emailInput.classList.add('error');
                }
            });
            
            passwordInput.addEventListener('input', () => {
                if (passwordInput.value.length >= 8) {
                    passwordInput.classList.remove('error');
                    passwordInput.classList.add('success');
                } else {
                    passwordInput.classList.remove('success');
                    passwordInput.classList.add('error');
                }
            });
            
            if (localStorage.getItem('rememberEmail')) {
                emailInput.value = localStorage.getItem('rememberEmail');
                if (localStorage.getItem('rememberEmail')) {
                    document.getElementById('remember').checked = true;
                }
            }
            
            emailInput.addEventListener('blur', () => {
                if (document.getElementById('remember').checked) {
                    localStorage.setItem('rememberEmail', emailInput.value);
                } else {
                    localStorage.removeItem('rememberEmail');
                }
            });
        });
    </script>
</body>
</html>
